name: macOS build

# Builds dhewm3 on macOS Apple Silicon (primary) and Intel (secondary).
# See docs/MACOS.md for the full support matrix.

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64 (Apple Silicon)
            runner: macos-14
            preset: macos-arm64
            arch: arm64
            primary: true
          - name: macOS x86_64 (Intel)
            runner: macos-13
            preset: macos-intel
            arch: x86_64
            primary: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: |
          brew update
          brew install cmake openal-soft sdl2 curl

      - name: Configure (CMake preset)
        run: cmake -S neo --preset ${{ matrix.preset }} -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Verify binary
        run: |
          file build/dhewm3
          otool -L build/dhewm3 | grep -E 'openal|SDL2|curl' || true
          # dhewm3 -h may exit non-zero; capture output and confirm it ran
          ./build/dhewm3 -h > smoke.log 2>&1 || true
          head -n 20 smoke.log

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhewm3-macos-${{ matrix.arch }}
          path: |
            build/dhewm3
            build/*.dylib
          if-no-files-found: warn

